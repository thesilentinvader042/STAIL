# .github/workflows/ci.yml
# STAIL Realty OS — Continuous Integration
#
# Triggers on every push and pull request targeting `main`.
# Jobs:
#   lint   — ruff format check + ruff lint
#   test   — pytest with SQLite in-memory DB + coverage upload

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Global environment ────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  # Test overrides — SQLite avoids needing a real Postgres service
  DATABASE_URL: "sqlite:///:memory:"
  SECRET_KEY: "ci-test-secret-key-not-for-production"
  ANTHROPIC_API_KEY: ""
  APP_ENV: "test"
  LOG_LEVEL: "WARNING"

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff — format check
        run: ruff format --check .

      - name: ruff — lint check
        run: ruff check .

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint        # only run tests if linting passes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      # Optional: upload to Codecov (set CODECOV_TOKEN in repo secrets)
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory — does not block merge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
